name: BetterMiFitnessSync
options:
  bundleIdPrefix: com.bettermifitness
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    # Per-sdk paths so simulator never links the device ComposeApp binary (and vice versa).
    "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework"
    "FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(SRCROOT)/../composeApp/build/bin/iosArm64/debugFramework"

targets:
  BetterMiFitnessSync:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        type: group
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bettermifitness.sync
        PRODUCT_NAME: BetterMiFitnessSync
        INFOPLIST_KEY_CFBundleDisplayName: Better Mi Fitness Sync
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework"
        "FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(SRCROOT)/../composeApp/build/bin/iosArm64/debugFramework"
        OTHER_LINKER_FLAGS: "$(inherited) -framework ComposeApp"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_VERSION: "5.9"
    dependencies: []
    entitlements:
      path: iosApp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          # Prefer CI / env JAVA_HOME; fall back to Homebrew JDK 17 on local Macs.
          if [ -z "${JAVA_HOME:-}" ] || [ ! -d "$JAVA_HOME" ]; then
            export JAVA_HOME="/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home"
          fi
          export PATH="$JAVA_HOME/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/.."
          # Device (iphoneos) vs Simulator — CI builds device for IPA download.
          if [ "${PLATFORM_NAME:-}" = "iphoneos" ]; then
            ./gradlew :composeApp:linkDebugFrameworkIosArm64
          else
            ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
          fi
        basedOnDependencyAnalysis: false
      # Static frameworks do not embed composeResources; copy them into the app
      # product so painterResource works on iOS (avoids MissingResource white screen).
      - name: "Sync Compose Resources"
        script: |
          if [ -z "${JAVA_HOME:-}" ] || [ ! -d "$JAVA_HOME" ]; then
            export JAVA_HOME="/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home"
          fi
          export PATH="$JAVA_HOME/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/.."
          # Needs Xcode env: PLATFORM_NAME, ARCHS, BUILT_PRODUCTS_DIR, UNLOCALIZED_RESOURCES_FOLDER_PATH
          ./gradlew :composeApp:syncComposeResourcesForIos
        basedOnDependencyAnalysis: false
